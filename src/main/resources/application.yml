spring:
  application:
    name: OrionETL
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:orionetl}
    username: ${POSTGRES_USER:orionetl}
    password: ${POSTGRES_PASSWORD:orionetl}
    hikari:
      pool-name: OrionETL-Pool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: WARN
    com.elyares.etl: INFO

orionetl:
  execution:
    max-chunk-size: 1000
    default-error-threshold-percent: 5.0
